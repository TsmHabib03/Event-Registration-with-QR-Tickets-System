<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Reports</title>
  <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="admin-dashboard.html">Admin Dashboard</a>
    <a href="admin-events.html">Manage Events</a>
    <a href="scanner.html">Check-in Scanner</a>
    <a href="admin-reports.html">Reports</a>
  </nav>

  <main>
    <div class="container">
      <h1>Attendance Reports</h1>

      <div style="max-width: 600px; margin: 30px 0;">
        <div class="card">
          <h2 style="margin-top: 0;">Select Event</h2>

          <div class="form-group">
            <label for="event-select">Event:</label>
            <select id="event-select">
              <option value="">Select an event...</option>
            </select>
          </div>

          <button id="export-csv-btn" class="btn" style="width: 100%;" disabled>Export CSV</button>
        </div>
      </div>

      <h2>Attendance Report</h2>
      <div id="report-container">
        <p style="text-align: center; color: #666;">Select an event to view the attendance report.</p>
      </div>
    </div>
  </main>

  <footer>
    <p>Event Registration System &copy; 2026 | Phase 1 Functionality</p>
  </footer>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/admin-reports.js"></script>
