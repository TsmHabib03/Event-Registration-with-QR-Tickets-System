<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body id="top">
  <nav>
    <a href="index.html">Home</a>
    <a href="admin-dashboard.html">Admin Dashboard</a>
    <a href="admin-events.html">Manage Events</a>
    <a href="scanner.html" class="active">Check-in Scanner</a>
    <a href="admin-reports.html">Reports</a>
  </nav>

  <main>
    <div class="container">
      <div class="hero-section" style="padding: 20px 0 20px;">
        <h1 class="hero-title">
          <span class="hero-line"><span class="hero-word" style="font-size: 2.5rem; letter-spacing: 0.1em;">Check-in</span></span>
          <span class="hero-line"><span class="hero-word" style="font-size: 3.5rem; letter-spacing: -0.03em;">Scanner</span></span>
        </h1>
        <p style="color:var(--text-secondary); margin-bottom:24px;">Scan attendee QR codes to check them in. Requires HTTPS and camera permission.</p>
      </div>

      <div class="scanner-card">
        <div class="card">

          <!-- Camera viewport -->
          <div id="qr-reader" class="scanner-viewport"></div>

          <!-- Status indicator -->
          <div class="scanner-status">
            <span class="scanner-status-dot" id="status-dot"></span>
            <span id="status-text">Idle — camera off</span>
          </div>

          <!-- Buttons -->
          <div class="scanner-btn-group">

            <!-- Start Camera -->
            <button id="start-btn" class="btn scanner-btn" style="display:flex;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <span class="btn-label">Start Camera</span>
            </button>

            <!-- Switch Camera (hidden until scanning) -->
            <button id="switch-btn" class="btn btn-secondary scanner-btn" style="display:none;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="1 4 1 10 7 10"/>
                <polyline points="23 20 23 14 17 14"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
              </svg>
              <span class="btn-label">Switch to Front Camera</span>
            </button>

            <!-- Stop Camera (hidden until scanning) -->
            <button id="stop-btn" class="btn btn-danger scanner-btn" style="display:none;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              </svg>
              <span class="btn-label">Stop Camera</span>
            </button>

          </div>

          <!-- Scan result -->
          <div id="scan-result" style="margin-top:16px;"></div>

        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>Event Registration System &copy; 2026</p>
  </footer>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/scanner.js"></script>
  <a href="#" class="scroll-top" id="scroll-top-btn" aria-label="Scroll to top">&uarr;</a>
  <script>
    (function() {
      var btn = document.getElementById('scroll-top-btn');
      window.addEventListener('scroll', function() {
        btn.classList.toggle('visible', window.scrollY > 300);
      });
    })();
  </script>
</body>
</html>
