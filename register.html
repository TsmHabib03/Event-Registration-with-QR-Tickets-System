<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register for Event</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body id="top">
  <nav>
    <a href="index.html">Home</a>
    <a href="events.html">Browse Events</a>
    <a href="admin-dashboard.html">Admin</a>
  </nav>

  <main>
    <div class="container">
      <div class="hero-section" style="padding: 20px 0 20px;">
        <h1 class="hero-title">
          <span class="hero-line"><span class="hero-word" style="font-size: 2.5rem; letter-spacing: 0.1em;">Event</span></span>
          <span class="hero-line"><span class="hero-word" style="font-size: 3.5rem; letter-spacing: -0.03em;">Registration</span></span>
        </h1>
      </div>

      <div id="event-summary"></div>

      <div style="max-width: 600px; margin: 30px auto;">
        <form id="register-form" class="card">
          <h2 style="margin-top: 0;">Register Now</h2>

          <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required>
          </div>

          <button type="submit" class="btn" style="width: 100%; padding: 12px;">Register</button>
        </form>

        <div id="form-message"></div>
      </div>
    </div>
  </main>

  <footer>
    <p>Event Registration System &copy; 2026 | Phase 1 Functionality</p>
  </footer>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/register.js"></script>
  <a href="#" class="scroll-top" id="scroll-top-btn" aria-label="Scroll to top">&uarr;</a>
  <script>
    (function() {
      var btn = document.getElementById('scroll-top-btn');
      window.addEventListener('scroll', function() {
        btn.classList.toggle('visible', window.scrollY > 300);
      });
    })();
  </script>
</body>
</html>
