<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration with QR Tickets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/main.css">
</head>
<body id="top">
  <nav>
    <a href="index.html" class="active">Home</a>
    <a href="events.html">Browse Events</a>
    <a href="admin-dashboard.html">Admin</a>
  </nav>

  <main>
    <div class="container">
      <div class="home-grid">
        <div class="hero-section">
          <h1 class="hero-title">
            <span class="hero-line"><span class="hero-word">Event</span></span>
            <span class="hero-line"><span class="hero-word">Registration</span></span>
            <span class="hero-line"><span class="hero-word">with QR Tickets</span></span>
          </h1>
          <p>Register for events and receive a unique QR ticket for instant check-in</p>

          <div style="margin: 40px 0;">
            <a href="events.html" class="btn" style="padding: 15px 40px; font-size: 16px;">Browse Events</a>
          </div>
        </div>

        <div class="ticket-lookup">
          <h3>Find Your Ticket</h3>
          <form id="find-ticket-form">
            <div class="form-group">
              <label for="lookup-email">Email Address:</label>
              <input type="email" id="lookup-email" required>
            </div>
            <div class="form-group">
              <label for="lookup-event-id">Event ID (optional):</label>
              <input type="text" id="lookup-event-id" placeholder="Leave blank to find all tickets">
            </div>
            <button type="submit" class="btn" style="width: 100%;">Find Ticket</button>
          </form>
          <div id="lookup-message"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>Event Registration System &copy; 2026 | Phase 1 Functionality</p>
  </footer>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/api.js"></script>
  <script>
    document.getElementById("find-ticket-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("lookup-email").value.trim();
      const eventId = document.getElementById("lookup-event-id").value.trim();
      const msgDiv = document.getElementById("lookup-message");

      if (!email) {
        msgDiv.innerHTML = '<div class="alert-error">Please enter your email address.</div>';
        return;
      }

      if (eventId) {
        window.location.href = `my-ticket.html?email=${encodeURIComponent(email)}&eventId=${encodeURIComponent(eventId)}`;
      } else {
        msgDiv.innerHTML = '<div class="alert-error">Please enter an Event ID to find your ticket.</div>';
      }
    });
  </script>
  <a href="#" class="scroll-top" id="scroll-top-btn" aria-label="Scroll to top">&uarr;</a>
  <script>
    (function() {
      var btn = document.getElementById('scroll-top-btn');
      window.addEventListener('scroll', function() {
        btn.classList.toggle('visible', window.scrollY > 300);
      });
    })();
  </script>
</body>
</html>
